[alembic]
# Path to migration scripts
script_location = alembic

# Template for migration file names
file_template = %%(rev)s_%%(slug)s

# SQLAlchemy connection URL
# NOTE: this is overridden in alembic/env.py using our app's settings,
# so this value is only a fallback for running alembic CLI directly.
sqlalchemy.url = postgresql+asyncpg://raguser:ragpassword@localhost:5432/ragdb

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
